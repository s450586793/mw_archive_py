<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型详情</title>
    <script>
        (function () {
            try {
                var t = localStorage.getItem('mw_theme');
                var theme = t === 'dark' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', theme);
            } catch (_) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <link rel="icon" href="/static/imgs/fav.ico" sizes="any">
    <link rel="icon" type="image/png" href="/static/imgs/fav.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/model.css?v=2.8">
</head>

<body>

    <div class="container" id="app">
        <!-- 加载状态 -->
        <div class="loading" id="loadingState">
            <div class="spinner"></div>
            <div>正在加载模型数据…</div>
        </div>

        <!-- 错误状态 -->
        <div class="error-msg hidden" id="errorState"></div>

        <!-- 主内容（初始隐藏） -->
        <div class="layout-wrapper hidden" id="mainContent">

            <!-- 左栏: 图文展示区 -->
            <div class="layout-main">
                <!-- 顶部图集 (轮播 / 英雄图) -->
                <div class="gallery-section card-block">
                    <img class="hero hidden" id="heroImage" src="" alt="screenshot">
                    <div id="carouselSection"></div>
                </div>

                <!-- 简介区 -->
                <div class="summary-section card-block">
                    <div class="section-title"><i class="fas fa-file-alt"></i> 模型简介</div>
                    <div class="summary" id="summaryContent"></div>
                </div>

                <!-- 打印成品墙 -->
                <div class="printed-section card-block">
                    <div class="section-title"><i class="fas fa-camera"></i> 打印成品</div>
                    <div class="printed">
                        <div class="attach-upload">
                            <input type="file" id="printedInput" multiple accept="image/*">
                            <button class="btn btn-outline" type="button" id="printedUploadBtn">
                                <i class="fas fa-upload"></i> 上传图片
                            </button>
                            <span class="attach-msg" id="printedMsg"></span>
                        </div>
                        <div class="printed-grid" id="printedList"></div>
                    </div>
                </div>

                <!-- 附件文件 (移动至左侧下方) -->
                <div class="attachments-section card-block">
                    <div class="section-title"><i class="fas fa-paperclip"></i> 附件文件</div>
                    <div class="attachments">
                        <div class="attach-upload">
                            <input type="file" id="attachInput" multiple>
                            <button class="btn btn-outline" type="button" id="attachUploadBtn">
                                <i class="fas fa-upload"></i> 上传附件
                            </button>
                            <span class="attach-msg" id="attachMsg"></span>
                        </div>
                        <ul class="attach-list" id="attachList"></ul>
                    </div>
                </div>
            </div>

            <!-- 右栏: 信息与操作区 -->
            <div class="layout-side">
                <!-- 最上方: 基本信息块 (移动端 order 1) -->
                <div class="info-section card-block">
                    <h1 class="title" id="titleSection"></h1>
                    <div class="download-warning hidden" id="downloadWarning"></div>
                    <div class="author" id="authorSection"></div>
                    <div class="source-badge hidden" id="sourceBadge"></div>
                    <div class="collect-date" id="collectDate"></div>
                    <div class="meta-extra hidden" id="metaExtraList"></div>
                    <div class="info-actions">
                        <button class="inst-admin-btn model-edit-open-btn" type="button" id="modelEditOpenBtn">
                            <i class="fas fa-pen"></i> 编辑归档
                        </button>
                        <button class="inst-admin-btn model-path-copy-btn" type="button" id="modelPathCopyBtn">
                            <i class="fas fa-copy"></i> 模型路径
                        </button>
                        <div class="info-toolbar__msg" id="modelEditMsg"></div>
                    </div>
                    <div id="statsSection"></div>
                </div>

                <!-- 标签 (移动端 order 2) -->
                <div class="tags-section card-block hidden" id="tagsBlock">
                    <div class="section-title"><i class="fas fa-tags"></i> 标签</div>
                    <div class="tag-list" id="tagList"></div>
                </div>

                <!-- 打印配置 / 实例 (移动端 order 4) -->
                <div class="instances-section card-block">
                    <div class="section-title"><i class="fas fa-layer-group"></i> 打印配置</div>
                    <div class="instance-admin hidden" id="instanceAdminBar">
                        <button class="inst-admin-btn primary" type="button" id="instanceImportOpenBtn"><i class="fas fa-plus"></i> 添加打印配置</button>
                    </div>
                    <div class="instances" id="instanceList"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- 盘片详情 Modal -->
    <div class="modal-overlay" id="platesModal">
        <div class="modal-content">
            <div class="modal-preview-area" id="platesModalPreview">
                <!-- 动态大图预览 -->
            </div>
            <div class="modal-side-panel">
                <div class="modal-header">
                    <h3>分盘详情</h3>
                    <button class="modal-close" id="platesModalClose"><i class="fas fa-times"></i></button>
                </div>
                <div class="modal-body" id="platesModalBody">
                    <!-- Javascript 动态填充 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 添加打印配置 Modal -->
    <div class="inst-import-modal" id="instanceImportModal" aria-hidden="true">
        <div class="inst-import-modal__inner" role="dialog" aria-modal="true" aria-labelledby="instanceImportTitle">
            <div class="inst-import-modal__header">
                <h3 id="instanceImportTitle"><i class="fas fa-plus-circle"></i> 添加打印配置</h3>
                <button class="inst-import-close" type="button" id="instanceImportCloseBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="inst-import-modal__body">
                <div class="inst-import-row">
                    <label>选择 3MF 文件</label>
                    <div class="inst-import-inline">
                        <input type="file" id="instanceImportFileInput" accept=".3mf">
                        <button class="inst-admin-btn" type="button" id="instanceImportParseBtn"><i class="fas fa-search"></i> 识别</button>
                    </div>
                </div>
                <div class="inst-import-preview hidden" id="instanceImportPreview">
                    <div class="inst-import-grid">
                        <div>
                            <label>配置标题</label>
                            <input type="text" id="instanceImportTitleInput" placeholder="识别后可修改">
                        </div>
                        <div>
                            <label>源文件名</label>
                            <div class="inst-import-file" id="instanceImportSourceName">-</div>
                        </div>
                    </div>
                    <div class="inst-import-row">
                        <label>配置介绍</label>
                        <textarea id="instanceImportSummaryInput" rows="3" placeholder="识别后可修改"></textarea>
                    </div>
                    <div class="inst-import-assets">
                        <div>
                            <div class="inst-import-assets-title">配置图片</div>
                            <div class="inst-import-gallery" id="instanceImportPics"></div>
                        </div>
                        <div>
                            <div class="inst-import-assets-title">分盘缩略图</div>
                            <div class="inst-import-gallery" id="instanceImportPlates"></div>
                        </div>
                    </div>
                </div>
                <div class="inst-import-msg" id="instanceImportMsg"></div>
            </div>
            <div class="inst-import-modal__footer">
                <button class="inst-admin-btn" type="button" id="instanceImportCancelBtn">取消</button>
                <button class="inst-admin-btn primary" type="button" id="instanceImportSaveBtn" disabled><i class="fas fa-save"></i> 保存配置</button>
            </div>
        </div>
    </div>

    <!-- 灯箱 -->
    <div class="lightbox" id="imgLightbox">
        <button class="lb-nav lb-prev"><i class="fas fa-chevron-left"></i></button>
        <img src="" alt="preview">
        <button class="lb-nav lb-next"><i class="fas fa-chevron-right"></i></button>
    </div>

    <div class="model-edit-modal" id="modelEditModal" aria-hidden="true">
        <div class="model-edit-modal__inner" role="dialog" aria-modal="true" aria-labelledby="modelEditTitle">
            <div class="model-edit-modal__header">
                <h3 id="modelEditTitle"><i class="fas fa-pen-to-square"></i> 在线编辑归档模型</h3>
                <button class="model-edit-close" type="button" id="modelEditCloseBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="model-edit-modal__body">
                <div class="model-edit-grid">
                    <div class="model-edit-field">
                        <label for="modelEditTitleInput">标题</label>
                        <input type="text" id="modelEditTitleInput" maxlength="120" placeholder="请输入模型标题">
                    </div>
                    <div class="model-edit-field">
                        <label for="modelEditCategoryInput">分类</label>
                        <input type="text" id="modelEditCategoryInput" maxlength="40" placeholder="例如：手办 / 收纳 / 装饰">
                    </div>
                </div>
                <div class="model-edit-field">
                    <label for="modelEditTagsInput">标签</label>
                    <textarea id="modelEditTagsInput" rows="3" placeholder="支持逗号、空格或换行分隔"></textarea>
                </div>
                <div class="model-edit-field">
                    <label for="modelEditVersionNoteInput">版本备注</label>
                    <input type="text" id="modelEditVersionNoteInput" maxlength="200" placeholder="例如：V2 改良支撑与拼装结构">
                </div>
                <div class="model-edit-field">
                    <label for="modelEditSummaryInput">说明</label>
                    <div class="model-edit-richtext">
                        <div class="model-edit-toolbar" id="modelEditToolbar">
                            <button type="button" class="model-edit-tool" data-cmd="bold"><i class="fas fa-bold"></i></button>
                            <button type="button" class="model-edit-tool" data-cmd="italic"><i class="fas fa-italic"></i></button>
                            <button type="button" class="model-edit-tool" data-cmd="underline"><i class="fas fa-underline"></i></button>
                            <button type="button" class="model-edit-tool" data-block="P">正文</button>
                            <button type="button" class="model-edit-tool" data-block="H2">标题</button>
                            <button type="button" class="model-edit-tool" data-block="H3">小标题</button>
                            <button type="button" class="model-edit-tool" data-cmd="insertUnorderedList"><i class="fas fa-list-ul"></i></button>
                            <button type="button" class="model-edit-tool" data-cmd="insertOrderedList"><i class="fas fa-list-ol"></i></button>
                            <button type="button" class="model-edit-tool" data-cmd="createLink"><i class="fas fa-link"></i></button>
                            <button type="button" class="model-edit-tool" data-cmd="removeFormat"><i class="fas fa-eraser"></i></button>
                        </div>
                        <div id="modelEditSummaryEditor" class="model-edit-editor" contenteditable="true" role="textbox" aria-multiline="true"></div>
                    </div>
                    <textarea id="modelEditSummaryInput" rows="10" placeholder="支持富文本编辑" class="hidden"></textarea>
                </div>
                <div class="model-edit-field">
                    <label>设计图管理</label>
                    <div class="model-edit-tip">可删除旧图、追加新图，并为任意保留图片设置封面。替换图片可通过“删除旧图 + 上传新图”完成。</div>
                    <div class="model-edit-gallery" id="modelEditGallery"></div>
                    <div class="model-edit-upload">
                        <input type="file" id="modelEditImageInput" multiple accept="image/*">
                    </div>
                </div>
                <div class="model-edit-history hidden" id="modelEditHistoryHint"></div>
                <div class="model-edit-status" id="modelEditStatus"></div>
            </div>
            <div class="model-edit-modal__footer">
                <button class="inst-admin-btn" type="button" id="modelRestoreLatestBtn">恢复最近备份</button>
                <button class="inst-admin-btn" type="button" id="modelEditCancelBtn">取消</button>
                <button class="inst-admin-btn primary" type="button" id="modelEditSaveBtn"><i class="fas fa-save"></i> 保存修改</button>
            </div>
        </div>
    </div>

    <script src="/static/js/theme.js?v=5.1.2"></script>
    <script src="/static/js/model.js?v=2.9"></script>
</body>

</html>
