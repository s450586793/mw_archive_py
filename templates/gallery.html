<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>本地模型库</title>
  <style>
    body { font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; margin:0; background:#f4f6f8; }
    .wrap { max-width: 1100px; margin: 28px auto; padding:0 16px; }
    header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
    h1 { margin:0; font-size:24px; }
    a.btn { padding:8px 12px; background:#1976d2; color:#fff; border-radius:8px; text-decoration:none; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:14px; }
    .card { background:#fff; border-radius:10px; padding:12px; box-shadow:0 4px 14px rgba(0,0,0,0.08); display:flex; flex-direction:column; }
    .card img { width:100%; height:160px; object-fit:cover; border-radius:8px; background:#000; }
    .title { font-size:15px; margin:8px 0 4px; font-weight:600; }
    .tags { font-size:12px; color:#666; }
    .muted { color:#777; font-size:13px; margin-top:8px; }
    .search { margin-bottom:12px; }
    input[type=text] { width:100%; padding:10px; border:1px solid #d0d7de; border-radius:8px; box-sizing:border-box; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>本地模型库</h1>
    <a class="btn" href="/config">配置 / 归档</a>
  </header>
  <div class="search">
    <input type="text" id="kw" placeholder="搜索标题或标签..." oninput="render()" />
  </div>
  <div id="grid" class="grid"></div>
  <div id="empty" class="muted" style="display:none;">暂无模型</div>
</div>
<script>
let models = [];

async function load(){
  const res = await fetch('/api/gallery');
  models = await res.json();
  render();
}

function render(){
  const kw = document.getElementById('kw').value.trim().toLowerCase();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  let list = models;
  if(kw){
    list = models.filter(m => (m.title||'').toLowerCase().includes(kw) || (m.tags||[]).some(t => t.toLowerCase().includes(kw)) );
  }
  grid.innerHTML='';
  if(!list.length){ empty.style.display='block'; return; } else { empty.style.display='none'; }
  list.forEach(m=>{
    const card = document.createElement('div');
    card.className='card';
    const img = document.createElement('img');
    img.src = `/files/` + m.dir + `/images/` + (m.cover || 'design_01.jpg');
    const title = document.createElement('div');
    title.className='title';
    title.textContent = m.title || m.baseName;
    const tags = document.createElement('div');
    tags.className='tags';
    tags.textContent = (m.tags||[]).join(' / ');
    card.appendChild(img);
    card.appendChild(title);
    card.appendChild(tags);
    card.onclick = ()=>{ window.open(`/files/${m.dir}/index.html`,`_blank`); };
    grid.appendChild(card);
  });
}

load();
</script>
</body>
</html>
